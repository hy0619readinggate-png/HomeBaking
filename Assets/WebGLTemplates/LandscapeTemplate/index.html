<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    html {
      width: 100%;
      height: 100%;
    }

    #game-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* 세로 화면일 때: 게임 숨김 */
    @media (orientation: portrait) {
      #game-wrapper {
        display: none;
      }
      #rotate-overlay {
        display: flex;
      }
    }

    #rotate-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a2e;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      color: #fff;
      font-family: sans-serif;
      gap: 20px;
    }

    .rotate-icon {
      width: 64px;
      height: 64px;
      animation: rotateAnim 2s ease-in-out infinite;
    }

    @keyframes rotateAnim {
      0%   { transform: rotate(0deg); }
      40%  { transform: rotate(90deg); }
      60%  { transform: rotate(90deg); }
      100% { transform: rotate(90deg); }
    }

    .rotate-message {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      color: #fff;
      font-family: sans-serif;
    }

    #loading-overlay.hidden {
      display: none;
    }

    .loading-bar-bg {
      width: 240px;
      height: 12px;
      background: #333;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 16px;
    }

    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: #4fc3f7;
      border-radius: 6px;
      transition: width 0.2s ease;
    }

    .loading-text {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <!-- 로딩 화면 -->
  <div id="loading-overlay">
    <div style="font-size: 18px; font-weight: bold;">{{{ PRODUCT_NAME }}}</div>
    <div class="loading-bar-bg">
      <div class="loading-bar-fill" id="loading-bar"></div>
    </div>
    <div class="loading-text" id="loading-text">Loading... 0%</div>
  </div>

  <!-- 게임 컨테이너 (회전 대상) -->
  <div id="game-wrapper">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <script>
    var canvas = document.getElementById("unity-canvas");
    var loadingOverlay = document.getElementById("loading-overlay");
    var loadingBar = document.getElementById("loading-bar");
    var loadingText = document.getElementById("loading-text");

    var buildUrl = "Build";
    var config = {
      dataUrl:          buildUrl + "/{{{ DATA_FILENAME }}}",
      frameworkUrl:     buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_WASM
      codeUrl:          buildUrl + "/{{{ CODE_FILENAME }}}",
#endif
#if MEMORY_FILENAME
      memoryUrl:        buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
      symbolsUrl:       buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
      streamingAssetsUrl: "StreamingAssets",
      companyName:      "{{{ COMPANY_NAME }}}",
      productName:      "{{{ PRODUCT_NAME }}}",
      productVersion:   "{{{ PRODUCT_VERSION }}}",
    };

    var script = document.createElement("script");
    script.src = buildUrl + "/{{{ LOADER_FILENAME }}}";
    script.onload = function () {
      createUnityInstance(canvas, config, function (progress) {
        var pct = Math.round(progress * 100);
        loadingBar.style.width = pct + "%";
        loadingText.textContent = "Loading... " + pct + "%";
      }).then(function (unityInstance) {
        loadingOverlay.classList.add("hidden");
      }).catch(function (message) {
        alert("게임 로드 실패: " + message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
